info:
  name: Auth - CreateToken
  type: http
  seq: 1

http:
  method: POST
  url: https://restful-booker.herokuapp.com/auth
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: "{\r

      \  \"username\": \"admin\",\r

      \  \"password\": \"password123\"\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.token
        method: jsonq
      variable:
        name: authBooking
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
