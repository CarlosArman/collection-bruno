info:
  name: Sort posts
  type: http
  seq: 5

http:
  method: GET
  url: "{{urlBase}}/posts?sortBy=title&order=asc"
  params:
    - name: sortBy
      value: title
      type: query
    - name: order
      value: asc
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
